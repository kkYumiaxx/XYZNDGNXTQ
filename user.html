<script>
// ================= 全局状态 =================
let notifyTab = "unread"; // 默认显示未读消息

// ================= 核心切换函数 =================
function go(pageName) {
  // 隐藏所有 page
  document.querySelectorAll(".page").forEach(page => {
    page.style.display = "none";
  });
  // 显示目标 page
  document.getElementById(pageName).style.display = "block";
}

// 绑定 tab 按钮跳转（你原有的 go 函数逻辑）
function switchTab(targetPage) {
  go(targetPage);
}

// ================= 消息 Tab 切换 =================
function switchNotifyTab(tab) {
  notifyTab = tab;
  // 隐藏所有内容
  document.querySelectorAll(".notify-content").forEach(item => {
    item.style.display = "none";
  });
  // 移除所有 tab 激活态
  document.querySelectorAll(".notify-tab").forEach(t => {
    t.classList.remove("active");
  });
  // 激活当前 tab 和内容
  document.getElementById(tab).style.display = "block";
  event.target.classList.add("active");
}

// ================= 帮助与反馈：提交反馈 =================
function submitFeedback() {
  const textarea = document.querySelector("#page-help textarea");
  const content = textarea.value.trim();
  if (!content) {
    alert("请输入反馈内容！");
    return;
  }
  // 模拟提交成功
  alert("反馈提交成功！我们会尽快处理～");
  textarea.value = "";
}

// ================= 退出登录：确认退出 =================
function logout() {
  if (confirm("确定要退出登录吗？")) {
    alert("已退出登录！");
    go("page-user"); // 退回个人中心
  }
}

// ================= 页面初始化 =================
window.onload = function() {
  // 默认进入「个人信息」页面
  go("page-profile");
};
</script>
