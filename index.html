    <div class="login-card">
        <!-- 登录标题 -->
        <div class="login-title">
            <h2>校园多功能管理器</h2>
            <p>请输入账号密码登录</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <!-- 账号输入框 -->
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" class="form-input" id="username" placeholder="请输入手机号/学生帐号名" required>
                </div>
                <div class="error-message" id="usernameError">请输入有效的手机号/学生帐号名</div>
            </div>

            <!-- 密码输入框 -->
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                </div>
                <div class="error-message" id="passwordError">密码长度不能少于6位</div>
            </div>

            <!-- 表单选项 -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe"> 记住密码
                </label>
                <a href="forgot-password.html" class="forgot-password">忘记密码？</a>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="login-btn" id="loginBtn">登录</button>
        </form>

        <!-- 注册提示 -->
        <div class="register-tip">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>
                            
         <!-- 注册界面 --> 
         // 没有帐号时，跳转到注册界面
            alert('即将跳转到注册页');
                window.location.href = 'registration.html'; 

    <div class="register-card">
        <!-- 注册标题 -->
        <div class="register-title">
            <h2>校园多功能管理器</h2>
            <p>填写信息完成注册</p>
        </div>

        <!-- 注册表单 -->
        <form id="registerForm">
            <!-- 学号/工号输入框 -->
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-id-card input-icon"></i>
                    <input type="text" class="form-input" id="stuId" placeholder="请输入学号/工号" required>
                </div>
                <div class="error-message" id="stuIdError">请输入有效的学号/工号（仅数字）</div>
            </div>                        
                            
            <!-- 表单验证JS -->                
            // 登录成功，跳转到首页
                alert('登录成功！即将跳转到首页');
                window.location.href = 'index.html';
